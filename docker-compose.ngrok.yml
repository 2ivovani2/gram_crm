# ngrok overlay — exposes the local web service via a public HTTPS tunnel
# so Telegram can deliver webhook updates to your local machine.
#
# Usage (via Makefile):
#   make dev
#
# Direct usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.ngrok.yml up -d

services:
  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    # Tunnel traffic to the web service using Docker's internal hostname.
    # ngrok does not depend on web being ready — it establishes the tunnel
    # and queues requests until the target becomes available.
    command: http web:8000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"   # ngrok inspector UI: http://localhost:4040
