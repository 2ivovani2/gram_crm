<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Нет доступа — GRAMLY CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0a05; --gold: #f0b429; --amber: #e07d0a;
  --gold-dim: rgba(240,180,41,.10); --gold-glow: rgba(240,180,41,.20);
  --border: rgba(240,180,41,.12); --text: #f5f0e2; --muted: #7a7060; --muted2: #a09080;
}
body {
  font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased; overflow: hidden;
}
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(240,180,41,.08) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 100%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 100%);
}
.card {
  position: relative; z-index: 1;
  background: rgba(19,17,8,.92); border: 1px solid var(--border);
  border-radius: 24px; padding: 48px 40px; text-align: center; max-width: 400px;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(240,180,41,.05);
  animation: cardIn .45s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes cardIn { from { opacity: 0; transform: translateY(24px) scale(.98); } to { opacity: 1; transform: none; } }
.icon { font-size: 52px; margin-bottom: 18px; line-height: 1; }
h1 { font-size: 21px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.3px; }
p { font-size: 13.5px; color: var(--muted2); line-height: 1.75; margin-bottom: 28px; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  text-decoration: none; margin: 4px; transition: all .18s;
}
.btn-ghost { border: 1px solid var(--border); background: var(--gold-dim); color: var(--muted2); }
.btn-ghost:hover { color: var(--text); border-color: rgba(240,180,41,.3); }
.btn-primary {
  background: linear-gradient(135deg, var(--gold) 0%, var(--amber) 100%);
  color: #0b0a05; border: none; box-shadow: 0 4px 18px var(--gold-glow);
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px var(--gold-glow); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
  <div class="icon">🔒</div>
  <h1>Нет доступа к CRM</h1>
  <p>
    Вы авторизованы как <strong style="color:var(--text)">{{ user.display_name }}</strong>,
    но у вас нет доступа ни к одному рабочему пространству CRM.<br><br>
    Обратитесь к главному администратору для получения доступа.
  </p>
  <a href="{% url 'crm:logout' %}" class="btn btn-ghost">Выйти</a>
  <a href="{% url 'landing' %}" class="btn btn-primary">На главную</a>
</div>
</body>
</html>
