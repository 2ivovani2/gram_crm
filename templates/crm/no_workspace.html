<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Нет доступа — GRAMLY CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#07090f;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px;text-align:center;max-width:400px}
h1{font-size:22px;font-weight:800;margin-bottom:10px}
p{font-size:14px;color:#94a3b8;line-height:1.7;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.07);color:#f1f5f9;margin:4px}
</style>
</head>
<body>
<div class="card">
  <div style="font-size:48px;margin-bottom:16px">🔒</div>
  <h1>Нет доступа к CRM</h1>
  <p>Вы авторизованы как <strong>{{ user.display_name }}</strong>, но у вас нет доступа ни к одному рабочему пространству CRM.<br><br>Обратитесь к главному администратору для получения доступа.</p>
  <a href="{% url 'crm:logout' %}" class="btn">Выйти</a>
  <a href="{% url 'landing' %}" class="btn">На главную</a>
</div>
</body>
</html>
