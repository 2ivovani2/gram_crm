# Use Docker's internal DNS resolver so upstream IPs are re-resolved
# after container restarts (prevents 502 with stale IPs).
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS — self-signed cert (generated by scripts/prod_up.sh)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/ssl/bot/webhook.pem;
    ssl_certificate_key /etc/ssl/bot/webhook.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # CRM user uploads (KB screenshots etc.)
    # Served directly by nginx — never hits Django
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "private";
        # Prevent script execution in uploads directory
        add_header X-Content-Type-Options nosniff;
    }

    # Telegram delivers webhook updates here
    location /bot/webhook/ {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
