# Use Docker's internal DNS resolver so upstream IPs are re-resolved
# after container restarts (prevents 502 with stale IPs).
resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP — redirect to HTTPS + serve Let's Encrypt ACME challenge
server {
    listen 80;
    server_name gramly.tech www.gramly.tech;

    # Allow certbot webroot challenge through before redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://gramly.tech$request_uri;
    }
}

# HTTPS — Let's Encrypt cert
server {
    listen 443 ssl;
    server_name gramly.tech www.gramly.tech;

    ssl_certificate     /etc/letsencrypt/live/gramly.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gramly.tech/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (safe once HTTPS is confirmed working)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10M;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # MinIO S3 proxy — CRM file uploads (KB screenshots etc.)
    # Django generates URLs like https://gramly.tech/s3/<bucket>/<path>
    # which nginx proxies to the internal MinIO container.
    #
    # NOTE: proxy_pass with a variable + URI component (e.g. $minio/) ignores
    # the request path — nginx sends only "/" to MinIO. Fix: use rewrite to strip
    # the /s3/ prefix, then proxy_pass with variable and no URI component.
    location /s3/ {
        set $minio http://minio:9000;
        rewrite ^/s3/(.+)$ /$1 break;
        proxy_pass $minio;
        proxy_set_header Host minio:9000;
        proxy_set_header X-Real-IP $remote_addr;
        client_max_body_size 20M;
    }

    # Telegram delivers webhook updates here
    location /bot/webhook/ {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
