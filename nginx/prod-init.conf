# Temporary HTTP-only config used during initial Let's Encrypt certificate issuance.
# After cert is obtained, nginx is reloaded with prod.conf (HTTPS).
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name gramly.tech www.gramly.tech;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy everything else to Django (health check etc.)
    location / {
        set $upstream http://web:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
    }
}
