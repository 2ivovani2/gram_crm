x-common: &common
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    <<: *common
    build: .
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - static_files:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "true"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 3 http://localhost:8000/health/ -o /dev/null || true"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  celery_worker:
    <<: *common
    build: .
    command: celery -A config.celery worker -l info -c 4 -Q celery,default,broadcasts
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  celery_beat:
    <<: *common
    build: .
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      # Note: no media_files volume — media is served from S3, not local disk
    depends_on:
      web:
        condition: service_healthy

  # One-shot container: run `docker compose run --rm certbot certonly ...`
  # Not started automatically — invoked by scripts/prod_up.sh during first deploy.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  redis_data:
  static_files:
  letsencrypt:
  certbot_www:
  # media_files removed: CRM uploads now go to S3-compatible storage (R2/MinIO).
  # No local volume needed; nginx no longer serves /media/.
