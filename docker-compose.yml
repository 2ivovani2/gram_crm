x-common: &common
  restart: unless-stopped
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── S3 file storage: MinIO ──────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    # Ports are NOT exposed on host — access only via nginx proxy at /s3/
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 8s
      timeout: 5s
      retries: 8
      start_period: 10s

  # One-shot: creates the bucket with public-read policy, then exits 0.
  # web/celery_worker depend on this completing successfully.
  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MC_HOST_local: http://${AWS_ACCESS_KEY_ID}:${AWS_SECRET_ACCESS_KEY}@minio:9000
    entrypoint: >
      /bin/sh -c "
        mc mb --ignore-existing local/${AWS_STORAGE_BUCKET_NAME} &&
        mc anonymous set download local/${AWS_STORAGE_BUCKET_NAME} &&
        echo '✓ MinIO bucket ready: ${AWS_STORAGE_BUCKET_NAME}'
      "

  web:
    <<: *common
    build: .
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - static_files:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --max-time 3 http://localhost:8000/health/ -o /dev/null || true"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  celery_worker:
    <<: *common
    build: .
    command: celery -A config.celery worker -l info -c 4 -Q celery,default,broadcasts
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

  celery_beat:
    <<: *common
    build: .
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - static_files:/app/staticfiles:ro
      # Note: no media_files volume — media served from MinIO via nginx /s3/ proxy
    depends_on:
      web:
        condition: service_healthy

  # One-shot container: run `docker compose run --rm certbot certonly ...`
  # Not started automatically — invoked by scripts/prod_up.sh during first deploy.
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

volumes:
  redis_data:
  static_files:
  letsencrypt:
  certbot_www:
  minio_data:
